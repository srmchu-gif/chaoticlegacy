services:
  - type: web
    name: chaoticdriven
    runtime: node
    plan: free
    rootDir: .
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: SQLITE_FILE
        value: /var/data/chaotic.db
      - key: PERSIST_DIR
        value: /var/data
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
    disks:
      - name: chaotic-data
        mountPath: /var/data
        sizeGB: 1
